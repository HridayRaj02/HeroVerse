<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HeroVerse</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="loader">
    <div class="loader-logo">HERO<span>VERSE</span></div>
    <div class="loader-bar-wrap"><div class="loader-bar" id="lbar"></div></div>
    <div class="loader-txt" id="ltxt">Loading heroes…</div>
  </div>

  <header>
    <div class="logo">HERO<span>VERSE</span></div>
    <button class="hamburger" onclick="toggleNav()">&#9776;</button>
    <nav id="nav">
      <a class="active" onclick="goto('dash',this)">Dashboard</a>
      <a onclick="goto('heroes',this)">All Heroes</a>
      <a onclick="goto('marvel',this)">Marvel</a>
      <a onclick="goto('dc',this)">DC</a>
      <a onclick="goto('favs',this)">Favs <span id="fbadge" class="badge">0</span></a>
    </nav>
    <div class="status" id="status">Loading…</div>
  </header>

  <main>

    <section id="sec-dash" class="sec active">
      <h2>Dashboard</h2>
      <div id="dash-body"><div class="spinner"></div></div>
    </section>

    <section id="sec-heroes" class="sec">
      <div class="sec-top">
        <h2>All Heroes <span id="heroes-count" class="count"></span></h2>
        <input type="text" id="hsearch" placeholder="Search…" oninput="filterHeroes()" />
      </div>
      <div class="filter-row" id="align-filters">
        <button class="fb active" onclick="setAlign('all',this)">All</button>
        <button class="fb" onclick="setAlign('good',this)">Heroes</button>
        <button class="fb" onclick="setAlign('bad',this)">Villains</button>
        <button class="fb" onclick="setAlign('neutral',this)">Neutral</button>
      </div>
      <div id="heroes-body" class="grid"></div>
      <div id="heroes-pg" class="pagination"></div>
    </section>

    <section id="sec-marvel" class="sec">
      <div class="sec-top">
        <h2>Marvel <span id="marvel-count" class="count"></span></h2>
        <input type="text" id="msearch" placeholder="Search…" oninput="filterMarvel()" />
      </div>
      <div id="marvel-body" class="grid"></div>
      <div id="marvel-pg" class="pagination"></div>
    </section>

    <section id="sec-dc" class="sec">
      <div class="sec-top">
        <h2>DC Comics <span id="dc-count" class="count"></span></h2>
        <input type="text" id="dsearch" placeholder="Search…" oninput="filterDC()" />
      </div>
      <div id="dc-body" class="grid"></div>
      <div id="dc-pg" class="pagination"></div>
    </section>

    <section id="sec-favs" class="sec">
      <div class="sec-top">
        <h2>Favourites</h2>
        <button class="btn-ghost" onclick="clearFavs()">Clear all</button>
      </div>
      <div id="favs-body" class="grid"></div>
    </section>

  </main>

  <!-- Hero Modal -->
  <div id="modal" class="overlay" onclick="if(event.target===this)closeM()">
    <div class="modal-box">
      <button class="close-btn" onclick="closeM()">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
